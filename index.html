<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judgement Domain</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
color:white;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
height:100vh;
background:url("TRIAL.jpeg") center/cover no-repeat;
overflow:hidden;
}

#overlay{
background:rgba(0,0,0,0.65);
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
box-sizing:border-box;
}

h1{
letter-spacing:3px;
font-size:34px;
margin-bottom:10px;
}

h2{
font-size:24px;
margin:10px 0;
}

p{
font-size:22px;
line-height:1.6;
}

button{
margin-top:30px;
padding:16px 34px;
font-size:20px;
border:none;
border-radius:12px;
background:#ff2e2e;
color:white;
cursor:pointer;
}

#verdictScene{
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
}

#verdict{
font-size:55px;
color:#ff2e2e;
font-weight:bold;
margin-bottom:20px;
}

#sentenceText{
font-size:24px;
line-height:1.6;
}

#thankyou{
display:none;
font-size:60px;
color:#ffd84d;
font-weight:bold;
}

</style>
</head>

<body>

<div id="overlay">

<!-- SCENE 1 -->

<div id="trialScene">

<h1>DOMAIN EXPANSION</h1>
<h2>DEADLY SENTENCING</h2>

<p>Case Under Review</p>

<p>Defendant: Maiku</p>

<p>
Is he committing<br>
to watch JJK tonight<br>
with Mira?
</p>

<button id="trialBtn">BEGIN TRIAL</button>

</div>


<!-- SCENE 2 -->

<div id="verdictScene">

<div id="verdict">VERDICT: GUILTY</div>

<div id="sentenceText">
Sentence:<br>
Watch JJK tonight<br>
with Mira
</div>

<button id="endBtn">ACCEPT SENTENCE</button>

</div>


<!-- SCENE 3 -->

<div id="thankyou">
THANK YOU!
</div>

</div>


<audio id="jjkMusic">
<source src="jjk_op.mp3" type="audio/mpeg">
</audio>


<script>

let trialBtn=document.getElementById("trialBtn")
let trialScene=document.getElementById("trialScene")
let verdictScene=document.getElementById("verdictScene")
let thankyou=document.getElementById("thankyou")
let music=document.getElementById("jjkMusic")

trialBtn.onclick=function(){

document.body.style.background="url('Verdict.jpeg') center/cover no-repeat"

trialScene.style.display="none"
verdictScene.style.display="flex"

music.volume=0.35
music.play()

}

document.getElementById("endBtn").onclick=function(){

music.pause()
music.currentTime=0

verdictScene.style.display="none"

thankyou.style.display="block"

setTimeout(()=>{

document.body.style.transition="0.8s"
document.body.style.opacity="0"

},2000)

}

document.addEventListener("visibilitychange",function(){

if(document.hidden){
music.pause()
}

})

</script>

</body>
  </html>
